<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>İlim Köşesi | Adana</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0b0e11;
--card:#15191d;
--green:#2d6a4f;
--text:#e9ecef;
--dim:#adb5bd;
--whatsapp:#25d366;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:Poppins, sans-serif;
background:var(--bg);
color:white;
display:flex;
justify-content:center;
min-height:100vh;
}

.app{
width:100%;
max-width:500px;
padding:15px;
}

.top-bar{
text-align:center;
padding:15px 0;
}

.top-bar img{
width:90px;
height:90px;
border-radius:50%;
border:2px solid var(--green);
background:#fff;
padding:2px;
}

.timer{
text-align:center;
margin-top:10px;
background:rgba(255,255,255,0.03);
padding:15px;
border-radius:20px;
}

#countdown{
font-size:2.8rem;
color:var(--whatsapp);
font-weight:600;
font-variant-numeric:tabular-nums;
}

#next-vakit-name{
font-size:0.85rem;
color:var(--dim);
letter-spacing:1px;
}

.vakit-bar{
display:grid;
grid-template-columns:repeat(5,1fr);
text-align:center;
font-size:0.75rem;
padding:15px 5px;
background:rgba(0,0,0,0.2);
margin:15px 0;
border-radius:15px;
}

.vakit-item b{
display:block;
font-size:0.95rem;
margin-top:4px;
color:var(--dim);
}

.active-vakit b{
color:var(--whatsapp);
font-weight:bold;
}

.nav-tabs{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-top:15px;
}

.nav-btn{
background:#1c2126;
border:1px solid rgba(255,255,255,0.05);
padding:16px;
border-radius:14px;
color:white;
font-weight:600;
font-size:0.95rem;
cursor:pointer;
transition:0.3s;
}

.nav-btn.active{
background:linear-gradient(135deg,#1b4332,#2d6a4f);
border:none;
}

.content{
text-align:center;
padding:20px 10px;
min-height:280px;
display:flex;
flex-direction:column;
justify-content:center;
}

#kat-etiket{
color:var(--whatsapp);
font-weight:600;
margin-bottom:10px;
font-size:0.9rem;
letter-spacing:1px;
}

#ana-metin{
font-family:Amiri, serif;
font-size:1.8rem;
line-height:1.6;
margin:0;
}

#kaynak{
margin-top:12px;
color:var(--dim);
font-size:0.95rem;
}

.refresh-btn{
background:var(--green);
border:none;
padding:12px 35px;
border-radius:30px;
color:white;
font-weight:600;
margin-top:15px;
margin-bottom:30px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
align-self:center;
}

.whatsapp-bar{
background:var(--whatsapp);
margin-top:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(37,211,102,0.3);
}

.whatsapp-bar a{
color:white;
text-decoration:none;
display:flex;
align-items:center;
justify-content:center;
gap:12px;
padding:18px;
font-size:1.1rem;
font-weight:600;
}

.wa-icon{
width:24px;
height:24px;
fill:white;
}

</style>
</head>

<body>

<div class="app">

<div class="top-bar">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ5kDqyb7ISRa7uW-xKuMKc0YuEadhUjs7p2Q&s">
</div>

<div class="timer">
<div id="next-vakit-name">VAKTE KALAN</div>
<div id="countdown">00:00:00</div>
</div>

<div class="vakit-bar">
<div class="vakit-item" id="i-Fajr">İmsak<b id="v-imsak">--:--</b></div>
<div class="vakit-item" id="i-Dhuhr">Öğle<b id="v-ogle">--:--</b></div>
<div class="vakit-item" id="i-Asr">İkindi<b id="v-ikindi">--:--</b></div>
<div class="vakit-item" id="i-Maghrib">Akşam<b id="v-aksam">--:--</b></div>
<div class="vakit-item" id="i-Isha">Yatsı<b id="v-yatsi">--:--</b></div>
</div>

<div class="content">

<div id="kat-etiket">Günün Ayeti</div>
<p id="ana-metin">Yükleniyor...</p>
<div id="kaynak"></div>

<!-- DEĞİŞTİR BUTONU ÜSTE ALINDI -->
<button class="refresh-btn" onclick="rastgeleGetir(aktifKategori)">
Değiştir
</button>

<div class="nav-tabs">
<button class="nav-btn active" onclick="tabDegistir('ayetler',this)">Ayet</button>
<button class="nav-btn" onclick="tabDegistir('hadisler',this)">Hadis</button>
<button class="nav-btn" onclick="tabDegistir('sahabeler',this)">Sahabe</button>
<button class="nav-btn" onclick="tabDegistir('dualar',this)">Dua</button>
</div>

</div>

<div class="whatsapp-bar">
<a href="https://chat.whatsapp.com/EqjGZOCxmr9IgJHyK5zjul?mode=gi_t" target="_blank">
Hadi iyiliği yayalım!
</a>
</div>

</div>

<script>

let vakitler={}
let veriler={}
let aktifKategori="ayetler"

const katIsimleri={
ayetler:"Günün Ayeti",
hadisler:"Günün Hadisi",
sahabeler:"Günün Sahabesi",
dualar:"Günün Duası"
}

async function vakitCek(){

const res=await fetch("https://api.aladhan.com/v1/timingsByCity?city=Adana&country=Turkey&method=13")
const data=await res.json()

vakitler=data.data.timings

document.getElementById("v-imsak").innerText=vakitler.Fajr
document.getElementById("v-ogle").innerText=vakitler.Dhuhr
document.getElementById("v-ikindi").innerText=vakitler.Asr
document.getElementById("v-aksam").innerText=vakitler.Maghrib
document.getElementById("v-yatsi").innerText=vakitler.Isha

updateCountdown()
setInterval(updateCountdown,1000)

}

function updateCountdown(){

if(!vakitler.Fajr)return

const now=new Date()

const vList=[
{n:"İMSAK",t:vakitler.Fajr,id:"i-Fajr"},
{n:"ÖĞLE",t:vakitler.Dhuhr,id:"i-Dhuhr"},
{n:"İKİNDİ",t:vakitler.Asr,id:"i-Asr"},
{n:"AKŞAM",t:vakitler.Maghrib,id:"i-Maghrib"},
{n:"YATSI",t:vakitler.Isha,id:"i-Isha"}
]

let next=null

for(let v of vList){

let vt=new Date()
const[h,m]=v.t.split(":")
vt.setHours(parseInt(h),parseInt(m),0)

if(vt>now){
next={v:v,z:vt}
break
}

}

if(!next){

let vt=new Date()
const[h,m]=vList[0].t.split(":")
vt.setDate(vt.getDate()+1)
vt.setHours(parseInt(h),parseInt(m),0)

next={v:vList[0],z:vt}

}

const diff=(next.z-now)-(2*60*1000)

const h=Math.floor(diff/3600000).toString().padStart(2,"0")
const m=Math.floor((diff%3600000)/60000).toString().padStart(2,"0")
const s=Math.floor((diff%60000)/1000).toString().padStart(2,"0")

document.getElementById("countdown").innerText=`${h}:${m}:${s}`
document.getElementById("next-vakit-name").innerText=next.v.n+" VAKTİNE KALAN"

document.querySelectorAll(".vakit-item").forEach(el=>el.classList.remove("active-vakit"))
document.getElementById(next.v.id).classList.add("active-vakit")

}

async function verileriGetir(){

const res=await fetch("https://api.npoint.io/94a7d4f2e4d98725a67c")
veriler=await res.json()

gunlukSabitGetir("ayetler")

}

function tabDegistir(kat,el){

aktifKategori=kat

document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"))
el.classList.add("active")

document.getElementById("kat-etiket").innerText=katIsimleri[kat]

gunlukSabitGetir(kat)

}

function gunlukSabitGetir(kat){

const l=veriler[kat]
if(!l)return

const d=new Date()
const dayIndex=(d.getDate()+d.getMonth()*31)%l.length

const s=l[dayIndex]

document.getElementById("ana-metin").innerText=s.metin||s.bilgi
document.getElementById("kaynak").innerText=s.kaynak||s.isim||""

}

function rastgeleGetir(kat){

const l=veriler[kat]
if(!l)return

const r=Math.floor(Math.random()*l.length)
const s=l[r]

document.getElementById("ana-metin").innerText=s.metin||s.bilgi
document.getElementById("kaynak").innerText=s.kaynak||s.isim||""

}

vakitCek()
verileriGetir()

</script>

</body>
</html>
