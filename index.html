<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İyiliğin Geleceği Kulübü</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin:0; padding:0; font-family: 'Roboto', sans-serif; }
  body { background: #fef9f4; color: #333; display:flex; flex-direction:column; min-height:100vh;}
  header { background: #4caf50; color:white; padding: 20px; text-align:center; position:relative;}
  header img { position:absolute; right:20px; top:15px; width:50px; height:auto; }
  header h1 { font-size:1.8rem; }
  nav { display:flex; justify-content:center; background:#fff; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
  nav button { flex:1; padding:15px; background:none; border:none; cursor:pointer; font-weight:600; color:#4caf50; transition:0.3s; font-size:1rem;}
  nav button:hover, nav button.active { background:#4caf50; color:white; }
  main { flex:1; display:flex; justify-content:center; align-items:center; padding:20px; text-align:center; }
  .content { background:white; padding:25px; border-radius:12px; box-shadow:0 5px 15px rgba(0,0,0,0.1); max-width:600px; width:100%; }
  .content p { font-size:1.2rem; line-height:1.6; margin-bottom:15px; }
  .content span { font-weight:bold; color:#4caf50; }
  footer { padding:15px; text-align:center; background:#f1f1f1; }
  footer a { text-decoration:none; background:#25D366; color:white; padding:10px 20px; border-radius:8px; font-weight:600; transition:0.3s; display:inline-block; }
  footer a:hover { background:#1ebe5d; }
  @media(max-width:600px){ header h1{font-size:1.5rem;} nav button{font-size:0.9rem; padding:12px;} .content p{font-size:1rem;} }
</style>
</head>
<body>

<header>
  <h1>İyiliğin Geleceği Kulübü</h1>
  <img src="https://ihh.org.tr/wp-content/uploads/2021/03/logo.png" alt="IHH Genç Logo">
</header>

<nav>
  <button class="active" data-category="rastgele">Günün Ayeti</button>
  <button data-category="hadis">Hadis</button>
  <button data-category="cami">Camisi</button>
  <button data-category="sahabe">Sahabe</button>
</nav>

<main>
  <div class="content">
    <p id="text">Yükleniyor...</p>
    <span id="reference"></span>
  </div>
</main>

<footer>
  <a href="https://chat.whatsapp.com/CTnxGJEI3pV4Xz1tjzkehQ?mode=gi_t" target="_blank">WhatsApp Grubuna Katıl</a>
</footer>

<script>
const apiUrl = "https://api.npoint.io/1cd52bb7c3d023ff1d5c"; // npoint API
const textEl = document.getElementById("text");
const refEl = document.getElementById("reference");
const buttons = document.querySelectorAll("nav button");

let data = [];

async function fetchData() {
  try {
    const res = await fetch(apiUrl);
    data = await res.json();
    showRandom("rastgele");
  } catch(err) {
    textEl.textContent = "İçerik yüklenemedi. Lütfen daha sonra tekrar deneyin.";
  }
}

function showRandom(category) {
  let filtered = data;
  if(category !== "rastgele") {
    filtered = data.filter(item => item.kategori === category);
  }
  const randomItem = filtered[Math.floor(Math.random() * filtered.length)];
  if(randomItem){
    textEl.textContent = randomItem.text;
    refEl.textContent = randomItem.reference || "";
  } else {
    textEl.textContent = "Bu kategori için içerik bulunamadı.";
    refEl.textContent = "";
  }
}

// Menü butonları
buttons.forEach(btn => {
  btn.addEventListener("click", () => {
    buttons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    showRandom(btn.dataset.category);
  });
});

fetchData();
</script>

</body>
</html>
