<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İyiliğin Geleceği Kulübü</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: #f3ece0;
    color: #4b3f36;
    font-family: 'Roboto', sans-serif;
  }
  header {
    background: #c8b8a3;
    color: #fff;
    padding: 15px;
    text-align: center;
    font-size: 1.7rem;
    font-family: 'Playfair Display', serif;
    position: sticky;
    top: 0;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  }
  nav {
    display: flex;
    justify-content: center;
    background: #d6c4b5;
    flex-wrap: wrap;
  }
  nav button {
    background: #e9d8c1;
    border: none;
    padding: 12px 18px;
    margin: 6px;
    font-size: 1rem;
    cursor: pointer;
    border-radius: 6px;
    transition: 0.3s;
    color: #4b3f36;
  }
  nav button:hover, nav button.active {
    background: #bfa18c;
    color: white;
  }
  main {
    padding: 20px;
    max-width: 800px;
    margin: auto;
  }
  .content-box {
    background: #fff8f0;
    padding: 22px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    font-size: 1.2rem;
    line-height: 1.6;
    text-align: center;
    min-height: 150px;
  }
  .whatsapp-btn {
    display: inline-block;
    margin-top: 18px;
    background: #25D366;
    color: white;
    padding: 12px 24px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
  }
  .whatsapp-btn:hover {
    background: #1ebe57;
  }
  footer {
    text-align: center;
    font-size: 0.9rem;
    padding: 12px;
    margin-top: 30px;
    color: #4b3f36;
  }
  .hidden {
    display: none;
  }
  @media(max-width:600px){
    nav button {
      flex: 1 1 100%;
    }
  }
</style>
</head>

<body>

<header>
  İyiliğin Geleceği Kulübü • İHH Genç
</header>

<nav>
  <button class="active" data-tab="ayet">Günün Ayeti</button>
  <button data-tab="hadis">Hadis</button>
  <button data-tab="cami">Camii</button>
  <button data-tab="sahabe">Sahabe</button>
</nav>

<main>
  <!-- Ayet Bölümü -->
  <div id="ayet" class="content-box">
    <div id="ayetText">Yükleniyor...</div>
    <div id="ayetSource" style="margin-top:10px; font-size:0.95rem; color:#555;"></div>

    <a class="whatsapp-btn" href="https://chat.whatsapp.com/CTnxGJEI3pV4Xz1tjzkehQ?mode=gi_t" target="_blank">
      WhatsApp Grubuna Katıl
    </a>
  </div>

  <!-- Diğer kategoriler -->
  <div id="hadis" class="content-box hidden">
    <p>Bu kategori için içerik yok.</p>
  </div>

  <div id="cami" class="content-box hidden">
    <p>Bu kategori için içerik yok.</p>
  </div>

  <div id="sahabe" class="content-box hidden">
    <p>Bu kategori için içerik yok.</p>
  </div>

</main>

<footer>&copy; 2026 İyiliğin Geleceği Kulübü</footer>

<script>
  const ayetTextEl = document.getElementById("ayetText");
  const ayetSourceEl = document.getElementById("ayetSource");

  fetch("https://api.npoint.io/174033acdbeb20c8534e")
    .then(response => response.json())
    .then(data => {
      // JSON içindeki "list" array’ine erişiyoruz
      const ayetList = data.list;
      if (Array.isArray(ayetList) && ayetList.length > 0) {
        const randomIndex = Math.floor(Math.random() * ayetList.length);
        ayetTextEl.textContent = ayetList[randomIndex].text;
        ayetSourceEl.textContent = ayetList[randomIndex].source;
      } else {
        ayetTextEl.textContent = "Günün ayeti bulunamadı.";
      }
    })
    .catch(err => {
      ayetTextEl.textContent = "Ayet yüklenirken hata oluştu.";
      console.error(err);
    });

  // Sekme butonları
  const buttons = document.querySelectorAll("nav button");
  const sections = document.querySelectorAll("main > div");

  buttons.forEach(btn => {
    btn.addEventListener("click", () => {
      buttons.forEach(b => b.classList.remove("active"));
      sections.forEach(s => s.classList.add("hidden"));

      btn.classList.add("active");
      document.getElementById(btn.dataset.tab).classList.remove("hidden");
    });
  });
</script>

</body>
</html>
