<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İyilik Ayeti</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
background: radial-gradient(circle at top,#1f4037,#0f2027);
color:white;
overflow:hidden;
}

.bgPattern{
position:absolute;
width:200%;
height:200%;
background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
background-size:40px 40px;
animation:moveBg 60s linear infinite;
}

@keyframes moveBg{
0%{transform:translate(0,0)}
100%{transform:translate(-200px,-200px)}
}

.card{

position:relative;
max-width:700px;
padding:50px 40px;
border-radius:24px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(14px);

box-shadow:0 15px 60px rgba(0,0,0,0.5);

text-align:center;

}

.title{

font-size:28px;
letter-spacing:2px;
margin-bottom:30px;

}

.ayet{

font-family:'Amiri',serif;
font-size:26px;
line-height:1.9;
opacity:0;
transform:translateY(10px);
transition:0.5s;

}

.ayet.show{

opacity:1;
transform:translateY(0);

}

.source{

margin-top:20px;
font-size:16px;
opacity:0.8;

}

button{

margin-top:35px;
padding:12px 28px;
border:none;
border-radius:40px;

background:linear-gradient(45deg,#ffd369,#ffb347);

color:#333;
font-weight:600;
cursor:pointer;

transition:0.3s;

}

button:hover{

transform:scale(1.07);

}

.footer{

margin-top:40px;
font-size:13px;
opacity:0.6;
line-height:1.6;

}

</style>
</head>

<body>

<div class="bgPattern"></div>

<div class="card">

<div class="title">📖 İyilik Ayeti</div>

<div id="ayet" class="ayet">Yükleniyor...</div>

<div id="kaynak" class="source"></div>

<button onclick="randomAyet()">Başka Ayet</button>

<div class="footer">
ÇÜ İyiliğin Geleceği Kulübü <br>
İHH Genç
</div>

</div>

<script>

let ayetler=[]

async function load(){

const res=await fetch("https://api.npoint.io/1cd52bb7c3d023ff1d5c")

const data=await res.json()

ayetler=data.list

randomAyet()

}

function randomAyet(){

const random=ayetler[Math.floor(Math.random()*ayetler.length)]

const ayet=document.getElementById("ayet")

ayet.classList.remove("show")

setTimeout(()=>{

ayet.innerText=random.text
document.getElementById("kaynak").innerText=random.source

ayet.classList.add("show")

},200)

}

load()

</script>

</body>
</html>
